<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ladderline</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="topbar">
    <h1><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; margin-right:6px;"><path d="M3 21h4v-4h4v-4h4v-4"/><path d="M15 9L21 3"/><path d="M16 3h5v5"/></svg>ladderline</h1>
    <nav class="topbar-nav">
      <button class="tab-btn active" data-tab="person">Person</button>
      <button class="tab-btn" data-tab="grid">Team grid</button>
      <button class="tab-btn" data-tab="notes">Notes</button>
      <button class="tab-btn" data-tab="insights">Insights</button>
    </nav>
    <div class="topbar-right">
      <span id="stale-banner" class="stale-banner" style="display:none;"></span>
      <a href="https://github.com/umbrova/ladderline/wiki" target="_blank" rel="noopener" class="docs-link"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px; margin-right:4px;"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>docs</a>
    </div>
  </div>

  <div class="tab-panel active" id="person-panel">
    <div class="layout">
      <div class="sidebar"><div id="person-list"></div></div>
      <div class="main" id="main">
        <div class="empty-state">Select a person to see their evidence overview.</div>
      </div>
    </div>
  </div>

  <div class="tab-panel" id="grid-panel"></div>
  <div class="tab-panel" id="notes-panel"></div>
  <div class="tab-panel" id="insights-panel"></div>

<script src="/app.js"></script>
</body>
</html>
